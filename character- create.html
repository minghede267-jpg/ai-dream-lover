<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建角色</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="character-form">
        <h2>创建你的角色</h2>
        <form id="create-character">
            <input type="text" id="char-name" placeholder="角色名字" required>
            <textarea id="char-personality" placeholder="性格（例如：温柔、傲娇）" rows="2"></textarea>
            <textarea id="char-background" placeholder="背景故事" rows="3"></textarea>
            <div class="presets">
                <label>性格预设：</label>
                <button type="button" data-preset="温柔,喜欢照顾人">温柔</button>
                <button type="button" data-preset="傲娇,嘴硬心软">傲娇</button>
                <button type="button" data-preset="冷酷,神秘">冷酷</button>
            </div>
            <button type="button" id="ai-suggest">✨ AI辅助生成详细设定</button>
            <button type="submit">保存角色并开始游戏</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/character.js"></script>
</body>
</html>
